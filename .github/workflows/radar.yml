name: Update Radar Screenshot
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Take Screenshot and Scan
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          (async () => {
            try {
              const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
              const page = await browser.newPage();
              await page.setViewport({ width: 1920, height: 1080 });
              await page.goto('https://geofs-live-radar.onrender.com', { waitUntil: 'networkidle2', timeout: 60000 });
              
              // Dark Mode Force
              await page.addStyleTag({ content: 'body, .leaflet-container { background: #000 !important; } .leaflet-tile-container img { filter: brightness(0.4) invert(1) contrast(3) hue-rotate(180deg) saturate(0.3) !important; } .leaflet-tile { background: #000 !important; }' });
              
              await new Promise(r => setTimeout(r, 15000)); 

              // Scan for callsigns
              const names = await page.evaluate(() => {
                const list = [];
                document.querySelectorAll('.leaflet-marker-icon').forEach(m => {
                  if (m.title) list.push(m.title.replace(/[^a-zA-Z0-9()[\] ]/g, ''));
                });
                return list;
              });

              // Organize Priorities
              const iaf = names.filter(n => n.includes('IAF')).join(', ') || 'None';
              const unidentified = names.filter(n => n.includes('[U]')).join(', ') || 'Clear';
              const others = names.slice(0, 10).join(', ') || 'None';

              const report = '🛰️ **GMRP-IAF TACTICAL REPORT**\n\n🟢 **IAF:** ' + iaf + '\n🟡 **[U]:** ' + unidentified + '\n🔴 **Others:** ' + others;
              
              fs.writeFileSync('report.txt', report);
              await page.screenshot({ path: 'radar.png' });
              await browser.close();
            } catch (err) {
              process.exit(1);
            }
          })();"

      - name: Send to Discord
        run: |
          # This sends the image first, then the text separately so they don't block each other
          curl -F "file=@radar.png" ${{ secrets.DISCORD_WEBHOOK }}
          curl -H "Content-Type: application/json" \
               -d "{\"content\": \"$(cat report.txt)\"}" \
               ${{ secrets.DISCORD_WEBHOOK }}
