name: Update Radar Screenshot
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Take Screenshot and Post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const { execSync } = require('child_process');
          (async () => {
            try {
              const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
              const page = await browser.newPage();
              await page.setViewport({ width: 1920, height: 1080 });
              await page.goto('https://geofs-live-radar.onrender.com', { waitUntil: 'networkidle2', timeout: 60000 });
              
              // Tactical Dark Mode
              await page.addStyleTag({ content: 'body, .leaflet-container { background: #000 !important; } .leaflet-tile-container img { filter: brightness(0.4) invert(1) contrast(3) hue-rotate(180deg) saturate(0.3) !important; } .leaflet-tile { background: #000 !important; }' });
              
              await new Promise(r => setTimeout(r, 15000)); 

              // Scan for callsigns
              const names = await page.evaluate(() => {
                const list = [];
                document.querySelectorAll('.leaflet-marker-icon').forEach(m => {
                  if (m.title) list.push(m.title.replace(/[^a-zA-Z0-9()[\] ]/g, ''));
                });
                return list;
              });

              // Organize Priorities
              const iaf = names.filter(n => n.toUpperCase().includes('IAF')).join(', ') || 'None Detected';
              const unidentified = names.filter(n => n.includes('[U]')).join(', ') || 'Clear';
              const others = names.slice(0, 8).join(', ') || 'None';

              const report = '🛰️ **GMRP-IAF TACTICAL REPORT**\n\n🟢 **IAF:** ' + iaf + '\n🟡 **[U]:** ' + unidentified + '\n🔴 **Others:** ' + others + '\n\n🔗 **Radar:** https://geofs-live-radar.onrender.com';
              
              await page.screenshot({ path: 'radar.png' });
              await browser.close();

              // SEND EVERYTHING TO DISCORD DIRECTLY FROM NODE
              const curlCmd = \`curl -X POST -F \"file=@radar.png\" -F \"payload_json={\\\"content\\\": \\\"\${report.replace(/\\n/g, '\\\\n')}\\\"}\" \${process.env.DISCORD_WEBHOOK}\`;
              execSync(curlCmd);

            } catch (err) {
              console.error(err);
              process.exit(1);
            }
          })();"
