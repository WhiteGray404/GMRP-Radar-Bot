name: Update Radar Screenshot
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Take Screenshot and Generate Report
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
            const page = await browser.newPage();
            await page.setViewport({ width: 1920, height: 1080 });
            await page.goto('https://geofs-live-radar.onrender.com', { waitUntil: 'networkidle2', timeout: 60000 });
            
            await page.addStyleTag({ content: 'body, .leaflet-container { background: #000 !important; } .leaflet-tile-container img { filter: brightness(0.4) invert(1) contrast(3) hue-rotate(180deg) saturate(0.3) !important; }' });
            
            await new Promise(r => setTimeout(r, 15000)); 

            const names = await page.evaluate(() => {
              return Array.from(document.querySelectorAll('.leaflet-marker-icon'))
                .map(m => m.title || '')
                .filter(t => t.length > 0);
            });

            const iaf = names.filter(n => n.toUpperCase().includes('IAF')).join(', ') || 'None';
            const unidentified = names.filter(n => n.includes('[U]')).join(', ') || 'Clear';
            const others = names.slice(0, 5).join(', ') || 'None';

            const report = '🛰️ **GMRP-IAF TACTICAL REPORT**\n\n🟢 **IAF:** ' + iaf + '\n🟡 **[U]:** ' + unidentified + '\n🔴 **Others:** ' + others;
            
            fs.writeFileSync('report.txt', report);
            await page.screenshot({ path: 'radar.png' });
            await browser.close();
          })();"

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # 1. Send the report text first
          curl -H "Content-Type: application/json" \
               -d "{\"content\": \"$(cat report.txt | sed ':a;N;$!ba;s/\n/\\n/g')\"}" \
               $DISCORD_WEBHOOK
          
          # 2. Send the image second
          curl -F "file=@radar.png" $DISCORD_WEBHOOK
