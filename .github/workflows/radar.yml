on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-radar]

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Take Screenshot and Generate Tactical Report
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
            const page = await browser.newPage();
            await page.setViewport({ width: 1920, height: 1080 });
            
            await page.goto('https://geofs-live-radar.onrender.com', { waitUntil: 'networkidle2', timeout: 60000 });
            
            // 1. RADAR SYNC: Wait for the website to actually initialize the Leaflet map
            await page.waitForFunction(() => {
              const el = document.querySelector('.leaflet-container');
              return el && (el._leaflet_map || Object.values(el).find(v => v._leaflet_map));
            }, { timeout: 60000 });

            // 2. FORCE POSITION: Set view to India
            await page.evaluate(() => {
              const el = document.querySelector('.leaflet-container');
              const map = el._leaflet_map || Object.values(el).find(v => v._leaflet_map)._leaflet_map;
              map.setView([22.5, 82.0], 5);
            });

            // Wait 45 seconds for aircraft markers to populate
            await new Promise(r => setTimeout(r, 45000)); 

            try { await page.click('.fa-moon'); } catch(e) {}

            const scanResult = await page.evaluate(() => {
              const el = document.querySelector('.leaflet-container');
              const map = el._leaflet_map || Object.values(el).find(v => v._leaflet_map)._leaflet_map;
              const india = { latN: 37.5, latS: 6.5, lngW: 68.0, lngE: 97.5 };

              return Array.from(document.querySelectorAll('.leaflet-marker-icon')).map(m => {
                const name = (m.title || m.innerText || m.getAttribute('aria-label') || '').replace(/[^a-zA-Z0-9()[\] _-]/g, '');
                
                // Safety check for marker position
                if (!m._leaflet_pos) return { name: 'Unknown', isOverIndia: false };
                
                const latLng = map.layerPointToLatLng(m._leaflet_pos);
                const isOverIndia = (latLng.lat <= india.latN && latLng.lat >= india.latS) &&
                                    (latLng.lng >= india.lngW && latLng.lng <= india.lngE);
                
                return { name, isOverIndia };
              });
            });

            const milTags = ['UKAF', 'USAF', 'RAAF', 'RIAF', 'RAF', 'RNZAF', 'UAEAF', 'BPYR', 'LUFT', 'AAF', 'CAEAF', 'CAE', 'RCAF', 'PAF', 'PAKISTAN'];

            // 3. INTELLIGENCE CATEGORIZATION
            const iafList = scanResult.filter(p => p.name.toUpperCase().includes('IAF')).map(p => p.name);
            
            const otherAFList = scanResult.filter(p => {
              const name = p.name.toUpperCase();
              const isMil = milTags.some(tag => name.includes(tag)) || name.includes('AIRFORCE') || name.endsWith('AF');
              const isIAF = name.includes('IAF');
              return isMil && !isIAF && !name.startsWith('EK');
            });

            const uList = scanResult.filter(p => {
              const name = p.name.toUpperCase();
              return name.includes('[U') && !iafList.includes(p.name) && !otherAFList.some(o => o.name === p.name);
            }).map(p => p.name);

            // 4. STATUS REPORTING
            let statusUpdate = '\\n\\n🔵 **STATUS:** All clear. No foreign military in sector.';
            const incursion = otherAFList.filter(p => p.isOverIndia);
            const otherAFNames = otherAFList.map(p => p.name);

            if (incursion.length > 0) {
              statusUpdate = '\\n\\n🚨 **RED ALERT: Foreign Military Aircraft detected inside INDIAN AIRSPACE!**\\n**Targets:** ' + incursion.map(i => i.name).join(', ');
            } else if (otherAFNames.length > 0) {
              statusUpdate = '\\n\\n⚠️ **WARNING: Foreign Military activity detected outside borders.**';
            }

            const report = '🛰️ **GMRP-IAF TACTICAL REPORT**\\n\\n🟢 **IAF:** ' + (iafList.length > 0 ? iafList.join(', ') : 'N/A') + 
                           '\\n🟡 **[U]:** ' + (uList.length > 0 ? uList.join(', ') : 'N/A') + 
                           '\\n🔴 **Other Air Forces:** ' + (otherAFNames.length > 0 ? otherAFNames.join(', ') : 'N/A') + statusUpdate;
            
            fs.writeFileSync('report.txt', report);
            await page.screenshot({ path: 'radar.png' });
            await browser.close();
          })();"

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          REPORT_BODY=$(cat report.txt)
          curl -H "Content-Type: application/json" \
               -d "$(JSON_REPORT=\"$REPORT_BODY\" node -e 'console.log(JSON.stringify({content: process.env.JSON_REPORT}))')" \
               $DISCORD_WEBHOOK
          curl -F "file=@radar.png" $DISCORD_WEBHOOK
