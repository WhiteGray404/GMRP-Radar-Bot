on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-radar]

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Take Screenshot and Generate Tactical Report
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
            const page = await browser.newPage();
            await page.setViewport({ width: 1920, height: 1080 });
            await page.goto('https://geofs-live-radar.onrender.com', { waitUntil: 'networkidle2', timeout: 60000 });
            
            // Wait 45 seconds to ensure all markers fetch
            await new Promise(r => setTimeout(r, 45000)); 

            // TACTICAL BLACK: Clicks the moon icon for Dark Mode
            try { await page.click('.fa-moon'); } catch(e) {}

            const names = await page.evaluate(() => {
              return Array.from(document.querySelectorAll('.leaflet-marker-icon'))
                .map(m => m.title || m.innerText || m.getAttribute('aria-label') || '')
                .filter(t => t.trim().length > 0)
                .map(t => t.replace(/[^a-zA-Z0-9()[\] _-]/g, ''));
            });

            // TARGET LIST (Cleaned up - UPPERCASE only as logic handles conversion)
            const milTags = ['UKAF', 'USAF', 'RAAF', 'RIAF', 'RAF', 'RNZAF', 'UAEAF', 'BPYR', 'LUFT', 'AAF', 'CAEAF', 'CAE', 'RCAF', 'PAF', 'PAKISTAN'];

            // 1. IAF Priority (Green)
            const iafList = names.filter(n => n.toUpperCase().includes('IAF'));
            
            // 2. Other Air Forces (Red) - Check military tags FIRST
            const otherAFList = names.filter(n => {
              const name = n.toUpperCase();
              const isSpecificMil = milTags.some(tag => name.includes(tag));
              const isAirforceKeyword = name.includes('AIRFORCE') || name.endsWith('AF') || name.includes(' AF');
              const isIAF = name.includes('IAF');
              const isCivilian = name.startsWith('EK'); 
              return (isSpecificMil || isAirforceKeyword) && !isIAF && !isCivilian;
            });

            // 3. Unidentified [U] (Yellow) - Catch remaining [U] tags that aren't military
            const uList = names.filter(n => {
              const name = n.toUpperCase();
              const hasUTag = name.includes('[U');
              const alreadyCaught = iafList.includes(n) || otherAFList.includes(n);
              return hasUTag && !alreadyCaught;
            });

            const iaf = iafList.length > 0 ? iafList.join(', ') : 'N/A';
            const unidentified = uList.length > 0 ? uList.join(', ') : 'N/A';
            const otherAFs = otherAFList.length > 0 ? otherAFList.join(', ') : 'N/A';

            // --- STATUS LOG LOGIC ---
            let statusUpdate = '\\n\\n🔵 **STATUS:** All clear. No high-priority threats in sector.';
            const highPriorityFound = otherAFList.some(n => {
                const name = n.toUpperCase();
                return name.includes('PAKISTAN') || name.includes('PAF');
            });

            if (highPriorityFound) {
                statusUpdate = '\\n\\n⚠️ **WARNING: High-Priority Targets detected in AO.**';
            }

            const report = '🛰️ **GMRP-IAF TACTICAL REPORT**\\n\\n🟢 **IAF:** ' + iaf + '\\n🟡 **[U]:** ' + unidentified + '\\n🔴 **Other Air Forces:** ' + otherAFs + statusUpdate;
            
            fs.writeFileSync('report.txt', report);
            await page.screenshot({ path: 'radar.png' });
            await browser.close();
          })();"

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          REPORT_BODY=$(cat report.txt)
          curl -H "Content-Type: application/json" \
               -d "$(JSON_REPORT=\"$REPORT_BODY\" node -e 'console.log(JSON.stringify({content: process.env.JSON_REPORT}))')" \
               $DISCORD_WEBHOOK
          curl -F "file=@radar.png" $DISCORD_WEBHOOK
