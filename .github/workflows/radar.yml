on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-radar]

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Take Screenshot and Generate Tactical Report
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
            const page = await browser.newPage();
            await page.setViewport({ width: 1920, height: 1080 });
            await page.goto('https://geofs-live-radar.onrender.com', { waitUntil: 'networkidle2', timeout: 60000 });
            
            await new Promise(r => setTimeout(r, 25000)); 

            const names = await page.evaluate(() => {
              return Array.from(document.querySelectorAll('.leaflet-marker-icon'))
                .map(m => m.title || m.innerText || '')
                .filter(t => t.length > 0)
                .map(t => t.replace(/[^a-zA-Z0-9()[\] ]/g, ''));
            });

            // TARGET LIST
            const milTags = ['USAF', 'RAAF', 'RIAF', 'RAF', 'RNZAF', 'UAEAF', 'BPYR', 'LUFT', 'AAF', 'CAEAF', 'CAE', 'RCAF'];

            // 1. IAF Priority
            const iafList = names.filter(n => n.toUpperCase().includes('IAF'));
            
            // 2. Unidentified [U]
            const uList = names.filter(n => n.includes('[U]'));
            
            // 3. Other Air Forces (Filtered by your specific list + any 'AF' suffix)
            const otherAFList = names.filter(n => {
              const name = n.toUpperCase();
              const isSpecificMil = milTags.some(tag => name.includes(tag));
              const endsInAF = name.endsWith('AF') || name.includes(' AF');
              const isAlreadyListed = name.includes('IAF') || n.includes('[U]');
              const isCivilian = name.startsWith('EK'); // Block Emirates/Civilian
              
              return (isSpecificMil || endsInAF) && !isAlreadyListed && !isCivilian;
            });

            const iaf = iafList.length > 0 ? iafList.join(', ') : 'N/A';
            const unidentified = uList.length > 0 ? uList.join(', ') : 'N/A';
            const otherAFs = otherAFList.length > 0 ? otherAFList.join(', ') : 'N/A';

            const report = '🛰️ **GMRP-IAF TACTICAL REPORT**\\n\\n🟢 **IAF:** ' + iaf + '\\n🟡 **[U]:** ' + unidentified + '\\n🔴 **Other Air Forces:** ' + otherAFs;
            
            fs.writeFileSync('report.txt', report);
            await page.screenshot({ path: 'radar.png' });
            await browser.close();
          })();"

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          REPORT_BODY=$(cat report.txt)
          curl -H "Content-Type: application/json" \
               -d "$(JSON_REPORT=\"$REPORT_BODY\" node -e 'console.log(JSON.stringify({content: process.env.JSON_REPORT}))')" \
               $DISCORD_WEBHOOK
          curl -F "file=@radar.png" $DISCORD_WEBHOOK
