name: Update Radar Screenshot
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Take Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            try {
              const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
              const page = await browser.newPage();
              await page.setViewport({ width: 1920, height: 1080 });
              await page.goto('https://geofs-live-radar.onrender.com', { waitUntil: 'networkidle2', timeout: 60000 });
              
              await page.addStyleTag({ content: 'body, .leaflet-container { background: #000 !important; } .leaflet-tile-container img { filter: brightness(0.4) invert(1) contrast(3) hue-rotate(180deg) saturate(0.3) !important; } .leaflet-tile { background: #000 !important; }' });
              
              await new Promise(r => setTimeout(r, 15000)); 

              const players = await page.evaluate(() => {
                const results = { iaf: [], unidentified: [], airspace: [] };
                document.querySelectorAll('.leaflet-marker-icon').forEach(marker => {
                  const title = marker.title || '';
                  if (title.includes('IAF')) {
                    results.iaf.push(title);
                  } else if (title.includes('[U]')) {
                    results.unidentified.push(title);
                  } else if (title !== '') {
                    results.airspace.push(title);
                  }
                });
                return results;
              });

              const fs = require('fs');
              let report = '🛰️ **GMRP-IAF TACTICAL RADAR REPORT**\n\n';
              report += '🟢 **1st Priority (IAF):** ' + (players.iaf.length > 0 ? players.iaf.join(', ') : 'None detected') + '\n';
              report += '🟡 **2nd Priority ([U]):** ' + (players.unidentified.length > 0 ? players.unidentified.join(', ') : 'Clear') + '\n';
              report += '🔴 **3rd Priority (Other Forces):** ' + (players.airspace.slice(0, 5).join(', ')) + (players.airspace.length > 5 ? '...and others' : '') + '\n';
              
              fs.writeFileSync('report.txt', report);
              await page.screenshot({ path: 'radar.png' });
              await browser.close();
            } catch (err) {
              console.error(err);
              process.exit(1);
            }
          })();"

      - name: Send to Discord
        run: |
          REPORT_TEXT=$(cat report.txt)
          curl -X POST -F "file=@radar.png" -F "payload_json={\"content\": \"$REPORT_TEXT \n\n🔗 Live Link: https://geofs-live-radar.onrender.com\"}" ${{ secrets.DISCORD_WEBHOOK }}
