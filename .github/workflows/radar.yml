name: Update Radar Screenshot
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Take Screenshot and Generate Report
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
            const page = await browser.newPage();
            await page.setViewport({ width: 1920, height: 1080 });
            
            await page.goto('https://geofs-live-radar.onrender.com', { waitUntil: 'networkidle2', timeout: 60000 });
            
            // Wait 25 seconds to ensure all player names load correctly
            await new Promise(r => setTimeout(r, 25000)); 

            const names = await page.evaluate(() => {
              const found = [];
              document.querySelectorAll('.leaflet-marker-icon').forEach(m => {
                const val = m.title || m.innerText || '';
                if (val.length > 0) found.push(val.replace(/[^a-zA-Z0-9()[\] ]/g, ''));
              });
              return found;
            });

            const iafList = names.filter(n => n.toUpperCase().includes('IAF'));
            const uList = names.filter(n => n.includes('[U]'));
            const otherList = names.filter(n => !n.toUpperCase().includes('IAF') && !n.includes('[U]')).slice(0, 10);

            const iaf = iafList.length > 0 ? iafList.join(', ') : 'N/A';
            const unidentified = uList.length > 0 ? uList.join(', ') : 'N/A';
            const others = otherList.length > 0 ? otherList.join(', ') : 'N/A';

            const report = '🛰️ **GMRP-IAF TACTICAL REPORT**\\n\\n🟢 **IAF:** ' + iaf + '\\n🟡 **[U]:** ' + unidentified + '\\n🔴 **Others:** ' + others;
            
            fs.writeFileSync('report.txt', report);
            await page.screenshot({ path: 'radar.png' });
            await browser.close();
          })();"

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # Read report and send both image and text in one go
          REPORT_BODY=$(cat report.txt)
          curl -H "Content-Type: multipart/form-data" \
               -F "file=@radar.png" \
               -F "payload_json={\"content\": \"$REPORT_BODY\"}" \
               $DISCORD_WEBHOOK
