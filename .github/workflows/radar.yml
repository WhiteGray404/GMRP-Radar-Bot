on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-radar]

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Take Screenshot and Generate Tactical Report
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
            const page = await browser.newPage();
            await page.setViewport({ width: 1920, height: 1080 });
            
            await page.goto('https://geofs-live-radar.onrender.com', { waitUntil: 'networkidle2', timeout: 90000 });
            
            // Wait for data stabilization
            await new Promise(r => setTimeout(r, 60000)); 

            try { await page.click('.fa-moon'); } catch(e) {}

            const scanResult = await page.evaluate(() => {
              const india = { latN: 37.5, latS: 6.5, lngW: 68.0, lngE: 97.5 };
              const mapEl = document.querySelector('.leaflet-container');
              const map = mapEl ? (mapEl._leaflet_map || Object.values(mapEl).find(v => v._leaflet_map)?._leaflet_map) : null;

              return Array.from(document.querySelectorAll('.leaflet-marker-icon')).map(m => {
                const name = (m.title || m.innerText || m.getAttribute('aria-label') || '').replace(/[^a-zA-Z0-9()[\] _-]/g, '');
                if (!name) return null;

                let isOverIndia = false;
                if (map && m._leaflet_pos) {
                  try {
                    const latLng = map.layerPointToLatLng(m._leaflet_pos);
                    isOverIndia = (latLng.lat <= india.latN && latLng.lat >= india.latS) &&
                                  (latLng.lng >= india.lngW && latLng.lng <= india.lngE);
                  } catch(e) {}
                }
                return { name, isOverIndia };
              }).filter(x => x !== null);
            });

            const milTags = ['UKAF', 'USAF', 'RAAF', 'RIAF', 'RAF', 'RNZAF', 'UAEAF', 'BPYR', 'LUFT', 'AAF', 'CAEAF', 'CAE', 'RCAF', 'PAF', 'PAKISTAN'];

            // 1. IAF (Friendly) - STRICTLY EXCLUDES RIAF
            const iafList = scanResult.filter(p => {
                const n = p.name.toUpperCase();
                return n.includes('IAF') && !n.includes('RIAF');
            }).map(p => p.name);
            
            // 2. Other Air Forces (Target List) - INCLUDES RIAF
            const otherAFList = scanResult.filter(p => {
              const name = p.name.toUpperCase();
              const isSpecificMil = milTags.some(tag => name.includes(tag));
              const isAirforceKeyword = name.includes('AIRFORCE') || name.endsWith('AF') || name.includes(' AF');
              const isFriendlyIAF = name.includes('IAF') && !name.includes('RIAF');
              
              return (isSpecificMil || isAirforceKeyword) && !isFriendlyIAF && !name.startsWith('EK');
            });

            // 3. Unidentified
            const uList = scanResult.filter(p => {
              const name = p.name.toUpperCase();
              const isFriendly = iafList.includes(p.name);
              const isOtherAF = otherAFList.some(o => o.name === p.name);
              return name.includes('[U') && !isFriendly && !isOtherAF;
            }).map(p => p.name);

            // 4. STATUS REPORTING
            let statusUpdate = '\\n\\n🔵 **STATUS:** All clear. No foreign military in sector.';
            const incursions = otherAFList.filter(p => p.isOverIndia).map(p => p.name);
            const otherAFNames = otherAFList.map(p => p.name);

            if (incursions.length > 0) {
              statusUpdate = '\\n\\n🚨 **RED ALERT: Foreign Military Aircraft detected inside INDIAN AIRSPACE!**\\n**Intercept Targets:** ' + incursions.join(', ');
            } else if (otherAFNames.length > 0) {
              statusUpdate = '\\n\\n⚠️ **WARNING: Foreign Military activity detected outside borders.**';
            }

            const report = '🛰️ **GMRP-IAF TACTICAL REPORT**\\n\\n🟢 **IAF:** ' + (iafList.length > 0 ? iafList.join(', ') : 'N/A') + 
                           '\\n🟡 **[U]:** ' + (uList.length > 0 ? uList.join(', ') : 'N/A') + 
                           '\\n🔴 **Other Air Forces:** ' + (otherAFNames.length > 0 ? otherAFNames.join(', ') : 'N/A') + statusUpdate;
            
            fs.writeFileSync('report.txt', report);
            await page.screenshot({ path: 'radar.png' });
            await browser.close();
          })();"
          
      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          REPORT_BODY=$(cat report.txt)
          curl -H "Content-Type: application/json" \
               -d "$(JSON_REPORT=\"$REPORT_BODY\" node -e 'console.log(JSON.stringify({content: process.env.JSON_REPORT}))')" \
               $DISCORD_WEBHOOK
          curl -F "file=@radar.png" $DISCORD_WEBHOOK
