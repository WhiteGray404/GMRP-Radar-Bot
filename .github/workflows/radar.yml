on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-radar]

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Take Screenshot and Generate Tactical Report
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
            const page = await browser.newPage();
            await page.setViewport({ width: 1920, height: 1080 });
            
            // Navigate to the radar URL
            await page.goto('https://geofs-live-radar.onrender.com', { waitUntil: 'networkidle2', timeout: 60000 });
            
            // INCREASED WAIT TIME: 45 seconds ensures the radar finishes fetching all 800+ markers
            await new Promise(r => setTimeout(r, 45000)); 

            const names = await page.evaluate(() => {
              // Scrape markers from title, inner text, or aria-labels
              return Array.from(document.querySelectorAll('.leaflet-marker-icon'))
                .map(m => m.title || m.innerText || m.getAttribute('aria-label') || '')
                .filter(t => t.trim().length > 0)
                // Sanitization: Allow alphanumeric, brackets, spaces, underscores, and dashes
                .map(t => t.replace(/[^a-zA-Z0-9()[\] _-]/g, ''));
            });

            // TARGET LIST (Case-insensitive check will be applied below)
            const milTags = ['UKAF', 'ukaf', 'USAF','usaf', 'RAAF', 'raaf', 'RIAF','riaf', 'RAF', 'raf', 'RNZAF','rnzaf', 'UAEAF', 'uaeaf', 'BPYR', 'bpyr', 'LUFT', 'luft', 'AAF','aaf', 'CAEAF','caeaf', 'CAE','cae', 'RCAF','rcaf', 'PAF','paf', 'PAKISTAN'];

            // 1. IAF Priority
            const iafList = names.filter(n => n.toUpperCase().includes('IAF'));
            
            // 2. Unidentified [U] (Captures [U], [UTP], etc.)
            const uList = names.filter(n => n.toUpperCase().includes('[U]'));
            
            // 3. Other Air Forces (Filter logic)
            const otherAFList = names.filter(n => {
              const name = n.toUpperCase();
              
              // Checks if the name contains any tag from our list (Case-Insensitive)
              const isSpecificMil = milTags.some(tag => name.includes(tag));
              
              // Checks for common military keywords
              const isAirforceKeyword = name.includes('AIRFORCE') || name.endsWith('AF') || name.includes(' AF');
              
              // Exclude if already in IAF or [U] sections, or if it is an EK (Emirates) civilian
              const isAlreadyListed = name.includes('IAF') || name.includes('[U]');
              const isCivilian = name.startsWith('EK'); 
              
              return (isSpecificMil || isAirforceKeyword) && !isAlreadyListed && !isCivilian;
            });

            // Format results for the Discord report
            const iaf = iafList.length > 0 ? iafList.join(', ') : 'N/A';
            const unidentified = uList.length > 0 ? uList.join(', ') : 'N/A';
            const otherAFs = otherAFList.length > 0 ? otherAFList.join(', ') : 'N/A';

            const report = '🛰️ **GMRP-IAF TACTICAL REPORT**\\n\\n🟢 **IAF:** ' + iaf + '\\n🟡 **[U]:** ' + unidentified + '\\n🔴 **Other Air Forces:** ' + otherAFs;
            
            // Save the report text and take the final screenshot
            fs.writeFileSync('report.txt', report);
            await page.screenshot({ path: 'radar.png' });
            await browser.close();
          })();"

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          REPORT_BODY=$(cat report.txt)
          curl -H "Content-Type: application/json" \
               -d "$(JSON_REPORT=\"$REPORT_BODY\" node -e 'console.log(JSON.stringify({content: process.env.JSON_REPORT}))')" \
               $DISCORD_WEBHOOK
          curl -F "file=@radar.png" $DISCORD_WEBHOOK
