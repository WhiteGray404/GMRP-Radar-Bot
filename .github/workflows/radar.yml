on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-radar]

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Take Screenshot and Generate Tactical Report
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
            const page = await browser.newPage();
            // 1. Set a fixed tactical resolution
            await page.setViewport({ width: 1920, height: 1080 });
            
            // 2. Load Radar centered on India with Zoom 5 (URL parameters)
            // lat=21.5, lon=81.0, z=5 centers India perfectly on a 1920x1080 screen
            await page.goto('https://geofs-live-radar.onrender.com/?lat=21.5&lon=81.0&z=5', { waitUntil: 'networkidle2', timeout: 90000 });
            
            // 3. Wait for aircraft markers to appear
            await page.waitForSelector('.leaflet-marker-icon', { timeout: 60000 });
            await new Promise(r => setTimeout(r, 20000)); // Short buffer for markers to finish moving

            // Tactical Black Map
            try { await page.click('.fa-moon'); } catch(e) {}

            const scanResult = await page.evaluate(() => {
              const all = [];
              // INDIA PIXEL GEOFENCE (Calibrated for 1920x1080 at Zoom 5)
              // These pixels cover the Indian mainland from Kashmir to Kanyakumari
              const indiaBox = { xMin: 720, xMax: 1250, yMin: 180, yMax: 880 };

              document.querySelectorAll('.leaflet-marker-icon').forEach(m => {
                const name = (m.title || m.innerText || m.getAttribute('aria-label') || '').replace(/[^a-zA-Z0-9()[\] _-]/g, '');
                if (!name) return;

                const rect = m.getBoundingClientRect();
                const isOverIndia = (rect.left > indiaBox.xMin && rect.left < indiaBox.xMax) &&
                                    (rect.top > indiaBox.yMin && rect.top < indiaBox.yMax);
                
                all.push({ name, isOverIndia });
              });
              return all;
            });

            const milTags = ['UKAF', 'USAF', 'RAAF', 'RIAF', 'RAF', 'RNZAF', 'UAEAF', 'BPYR', 'LUFT', 'AAF', 'CAEAF', 'CAE', 'RCAF', 'PAF', 'PAKISTAN'];

            // 4. Intelligence Categorization
            const iafList = scanResult.filter(p => p.name.toUpperCase().includes('IAF')).map(p => p.name);
            
            // Other AFs - STRICTLY EXCLUDE IAF
            const otherAFList = scanResult.filter(p => {
              const name = p.name.toUpperCase();
              const isMil = milTags.some(tag => name.includes(tag)) || name.includes('AIRFORCE') || name.endsWith('AF');
              const isIAF = name.includes('IAF');
              return isMil && !isIAF && !name.startsWith('EK');
            });

            const uList = scanResult.filter(p => {
              const name = p.name.toUpperCase();
              return name.includes('[U') && !iafList.includes(p.name) && !otherAFList.some(o => o.name === p.name);
            }).map(p => p.name);

            // 5. Status Logic (Red Alert for any AF in the India Box)
            let statusUpdate = '\\n\\n🔵 **STATUS:** All clear. No foreign military in sector.';
            
            // Any foreign mil plane inside the pixel box triggers the Red Alert
            const incursions = otherAFList.filter(p => p.isOverIndia).map(p => p.name);
            const otherAFNames = otherAFList.map(p => p.name);

            if (incursions.length > 0) {
              statusUpdate = '\\n\\n🚨 **RED ALERT: Foreign Military Aircraft detected inside INDIAN AIRSPACE!**\\n**Intercept Targets:** ' + incursions.join(', ');
            } else if (otherAFNames.length > 0) {
              statusUpdate = '\\n\\n⚠️ **WARNING: Foreign Military activity detected outside borders.**';
            }

            const report = '🛰️ **GMRP-IAF TACTICAL REPORT**\\n\\n🟢 **IAF:** ' + (iafList.length > 0 ? iafList.join(', ') : 'N/A') + 
                           '\\n🟡 **[U]:** ' + (uList.length > 0 ? uList.join(', ') : 'N/A') + 
                           '\\n🔴 **Other Air Forces:** ' + (otherAFNames.length > 0 ? otherAFNames.join(', ') : 'N/A') + statusUpdate;
            
            fs.writeFileSync('report.txt', report);
            await page.screenshot({ path: 'radar.png' });
            await browser.close();
          })();"
          
      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          REPORT_BODY=$(cat report.txt)
          curl -H "Content-Type: application/json" \
               -d "$(JSON_REPORT=\"$REPORT_BODY\" node -e 'console.log(JSON.stringify({content: process.env.JSON_REPORT}))')" \
               $DISCORD_WEBHOOK
          curl -F "file=@radar.png" $DISCORD_WEBHOOK
