name: Update Radar Screenshot
on:
  schedule:
    - cron: '*/30 * * * *' # Updates every 30 minutes
  workflow_dispatch: # Allows manual refresh

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Take Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
            const page = await browser.newPage();
           await page.goto('https://geofs-live-radar.onrender.com', { waitUntil: 'networkidle2' });
            
            // This part finds the Theme button and clicks it to make it black
            try {
                const themeButton = await page.$('.fa-sun, .fa-moon, [title*="theme"]');
                if (themeButton) await themeButton.click();
            } catch (e) {
                console.log("Could not find theme button, trying CSS force...");
            }

            // Force the background to black just in case
            await page.addStyleTag({ content: 'body, .leaflet-container { background: #000 !important; }' });
            
            await new Promise(r => setTimeout(r, 10000)); 
            await page.screenshot({ path: 'radar.png' });
            await browser.close();
